name: Main ReadMe Updater

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 */1 * *'
#            ││ │  ││
#            ││ │  │└ Hari dalam minggu (0-6, Minggu = 0)
#            ││ │  └── Bulan (1-12)
#            ││ └───── Hari dalam bulan (1-31)
#            │└──────── Jam (0-24)
#            └─────────── Menit (0-59)
#            '*/n' = every n | 'n,n' = multi value | 'n-n' = rentang
#            '*'   = INCLUDE ALL VALUE (('* * * * *') = jalan setiap menit...)
  workflow_dispatch:
  
permissions:
  contents: write  

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 🎏 Fetch repo
        uses: actions/checkout@master
        with:
          fetch-depth: 1
      - name: ✨ Create ReadMe.md
        run: |
          cd ${GITHUB_WORKSPACE}/
          npm i
          node src/update.js
      - name: 🚀 Deploy
        run: |
          git config --global user.name "${{ secrets.USERNAME }}"
          git config --global user.email "${{ secrets.EMAIL_ADDRESS }}"
          git add .
          git commit -am "[Automatic] Updated ReadMe.md 
        
          Co-authored-by: ${{ secrets.CO_USERNAME }} <${{ secrets.CO_AUTHOR }}@gmail.com>"
          git push --all -f https://${{ secrets.MY_PAT }}@github.com/${GITHUB_REPOSITORY}.git
